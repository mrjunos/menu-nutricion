<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="description" content="Menú del plan de alimentación de Juan y Dahiana — I Daniel Nutrition">
  <title>Menú · Plan de alimentación</title>
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <script>
    // aplicar tema antes del primer paint para evitar flash
    try {
      const p = JSON.parse(localStorage.getItem('menu-nutricion-prefs-v1') || '{}');
      const t = p.ui?.theme && p.ui.theme !== 'system'
        ? p.ui.theme
        : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = t;
    } catch {}
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
